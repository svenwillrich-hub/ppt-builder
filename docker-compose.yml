services:
  frontend:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./outputs:/app/outputs
      - ./uploads:/app/uploads
      - ./skills:/app/skills:ro
      - ./config:/app/config
      - ${CLAUDE_HOME:-${HOME:-${USERPROFILE}}}/.claude:/home/appuser/.claude
      - ${CLAUDE_HOME:-${HOME:-${USERPROFILE}}}/.claude.json:/home/appuser/.claude.json
      - ./.credentials.json:/home/appuser/.claude/.credentials.json
